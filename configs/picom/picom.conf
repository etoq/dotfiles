# ── Backend ───────────────────────────────────
backend = 'glx';
vsync = true;
glx-no-stencil = true;
# ── Прозрачность ──────────────────────────────
inactive-opacity = 0.88;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
# Исключения — полная непрозрачность:
opacity-rule = [
"100:class_g = 'virt-manager'",
"100:class_g = 'mpv'",
"100:name *= 'YouTube'",
];
# ── Тени ──────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.4;
shadow-exclude = [
"class_g = 'eww-bar'",
"class_g = 'Rofi'",
"_GTK_FRAME_EXTENTS@:c",
];
# ── Blur (если нужно) ─────────────────────────
# Включи если хочешь blur за окнами:
# blur-method = 'dual_kawase';
# blur-strength = 6;
# ── Анимации ──────────────────────────────────
transition-length = 120;
transition-pow-x = 0.1;
transition-pow-y = 0.1;
transition-pow-w = 0.1;
transition-pow-h = 0.1;
size-transition = true;
