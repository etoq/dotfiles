# ── Шрифт ─────────────────────────────────────
font_family JetBrainsMono Nerd Font
bold_font JetBrainsMono Nerd Font Bold
italic_font JetBrainsMono Nerd Font Italic
font_size 11.0
# ── Dracula Colors ────────────────────────────
foreground #F8F8F2
background #1E1E2F 
background_opacity 0.8
dynamic_background_color yes
selection_foreground #ffffff
selection_background #44475A
# Black
color0 #21222C
color8 #6272A4
# Red
color1 #FF5555
color9 #FF6E6E
# Green
color2 #50FA7B
color10 #69FF94
# Yellow
color3 #F1FA8C
color11 #FFFFA5
# Blue/Purple
color4 #BD93F9
color12 #D6ACFF
# Pink
color5 #FF79C6
color13 #FF92DF
# Cyan
color6 #8BE9FD
color14 #A4FFFF
# White
color7 #F8F8F2
color15 #FFFFFF
# ── Курсор ────────────────────────────────────
cursor #BD93F9
cursor_text_color #0D1117
cursor_shape block
cursor_blink_interval 0.5
# ── Окно ──────────────────────────────────────
window_padding_width 8
hide_window_decorations yes
confirm_os_window_close 0
# ── Tab bar ───────────────────────────────────
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_background #0D1117
tab_title_template '{index}: {title}'
active_tab_foreground #0D1117
active_tab_background #BD93F9
inactive_tab_foreground #6272A4
inactive_tab_background #1A1A2E
# ── URL ───────────────────────────────────────
url_color #8BE9FD
url_style curly
open_url_with default
# ── Производительность ────────────────────────
repaint_delay 8
input_delay 2
sync_to_monitor yes
