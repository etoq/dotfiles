vi_mode           = true
esc_to_abort      = true
cheatsheet_entry  = "?"
cheatsheet_viewer = "less -R; clear"
clear_screen_after_execution = false
loop_mode         = false
external_editor   = "nvim"
delay_startup     = 25
callback          = ""

# ── OVERLAY — картинка по центру ─────────────────────────────────────────────
[overlay]
# Увеличили размер картинки с 36x10 до 65x14 (сделали её широкой панорамой)
overlay_cmd = "chafa -s 46x14 --colors=full \"$HOME/.config/otter-launcher/image.png\""
overlay_trimmed_lines = 0
overlay_height        = 14
move_overlay_right    = 2   
move_overlay_down     = 0

# ── INTERFACE ─────────────────────────────────────────────────────────────────
[interface]
# Удлинили линии ────, чтобы они соответствовали широкой картинке
header = "  \u001B[38;2;98;114;164m──────────────────────────────────────────────\n\u001B[38;2;189;147;249m\u001B[1m  󱢴 ZER0\n   \u001B[38;2;241;250;140m$(uptime -p | sed 's/up //')\n\u001B[38;2;98;114;164m  ──────────────────────────────────────────────\n\u001B[38;2;189;147;249m\u001B[1m  󱎘 \u001B[0;1m"
place_holder       = "\u001B[38;2;98;114;164mtype and search...\u001B[0m"
suggestion_mode    = "list"
suggestion_lines   = 3
prefix_padding     = 5
list_prefix        = "  \u001B[38;2;98;114;164m│  \u001B[0m"
selection_prefix   = "  \u001B[38;2;189;147;249m\u001B[1m▌  \u001B[0m"
customized_list_order = true
# Удлинили линию сепаратора
separator = """\u001B[38;2;98;114;164m  ──────────────────────────────────────────────\u001B[0m"""
footer    = ""
default_module_message = "  \u001B[38;2;98;114;164m│  \u001B[38;2;189;147;249m \u001B[0m google search"
empty_module_message   = "  \u001B[38;2;98;114;164m│  \u001B[38;2;189;147;249m \u001B[0m app launcher"
indicator_with_arg_module = "\u001B[38;2;189;147;249m❯\u001B[0m"
indicator_no_arg_module   = "\u001B[38;2;98;114;164m○\u001B[0m"
prefix_color       = "\u001B[38;2;189;147;249m\u001B[1m"
description_color  = "\u001B[38;2;98;114;164m"
place_holder_color = "\u001B[38;2;98;114;164m"
hint_color         = "\u001B[38;2;98;114;164m"
move_interface_right = 0
# Опустили текст ниже, так как картинка теперь высотой 14 строк
