description = "Work: 1 hour (notifies at 1h)"
prefix = "t1"
cmd = """
bspc desktop -f '^7'
setsid -f kitty --start-as=fullscreen --class tomato-timer --override background=#1E1E2F --override foreground=#BD93F9 -e bash -c '
  (
    sleep 1h
    notify-send -u critical "🛑 Отличная работа!" "Прошел 1 час. Время сделать перерыв!"
  ) &
  pid=$!
  termdown 1h --blink
  kill $pid 2>/dev/null
' >/dev/null 2>&1
"""
unbind_proc = true

[[modules]]
description = "Rest: 30 minutes (notifies at 30m)"
prefix = "t30"
cmd = """
bspc desktop -f '^7'
setsid -f kitty --start-as=fullscreen --class tomato-timer --override background=#1E1E2F --override foreground=#BD93F9 -e bash -c '
  (
    sleep 30m
    notify-send -u critical "☕ Отдых окончен" "Прошло 30 минут. Пора возвращаться за работу!"
  ) &
  pid=$!
  termdown 30m --blink
  kill $pid 2>/dev/null
' >/dev/null 2>&1
"""
unbind_proc = true
