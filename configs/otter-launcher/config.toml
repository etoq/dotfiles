# ── SYSTEM ────────────────────────────────────────────────────────────────────

[[modules]]
description = "power menu"
prefix = "po"
cmd = """
choice="$(printf '  reboot\n  poweroff\n  suspend\n  lock\n  logout' \
  | fzf --no-sort \
    --cycle --gutter ' ' --pointer '▌' \
    --color 'bg:#1F2937,bg+:#1F2937,fg:#F8F8F2,hl:#FF5555,pointer:#FF5555' \
    --prompt '  ')"
case "$choice" in
  *reboot)   systemctl reboot ;;
  *poweroff) systemctl poweroff ;;
  *suspend)  systemctl suspend ;;
  *lock)     betterlockscreen -l dimblur;;
  *logout)   bspc quit ;;
esac
"""

[[modules]]
description = "system health"
prefix = "sys"
cmd = "kitty --class syshealth -e ~/.local/bin/syshealth >/dev/null 2>&1 & disown"
