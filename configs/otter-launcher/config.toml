# ── VMs ───────────────────────────────────────────────────────────────────────

[[modules]]
description = "virt-manager"
prefix = "vm"
cmd = "virt-manager >/dev/null 2>&1 & disown"
unbind_proc = true

[[modules]]
description = "VM control (fzf)"
prefix = "vms"
cmd = """
vm="$(virsh list --all --name 2>/dev/null | grep -v '^$' \
  | fzf \
    --cycle --gutter ' ' --pointer '▌' \
    --color 'bg:#0D1117,bg+:#1F2937,fg:#F8F8F2,hl:#8BE9FD,pointer:#8BE9FD' \
    --prompt '  VM > ' \
    --preview 'virsh dominfo {} 2>/dev/null' \
    --preview-window=right:40%)"
[ -z "$vm" ] && exit 0
state="$(virsh domstate "$vm" 2>/dev/null)"
action="$(printf '  start\n  shutdown\n  reboot\n  force-off\n  snapshot' \
  | fzf --prompt "  $vm [$state] > " \
    --color 'bg:#0D1117,bg+:#1F2937,fg:#F8F8F2,hl:#8BE9FD,pointer:#8BE9FD')"
case "$action" in
  *start)     virsh start "$vm" && notify-send "VM" "Starting $vm" ;;
  *shutdown)  virsh shutdown "$vm" ;;
  *reboot)    virsh reboot "$vm" ;;
  *force-off) virsh destroy "$vm" ;;
  *snapshot)  virsh snapshot-create-as "$vm" "snap-$(date +%Y%m%d-%H%M)" \
              && notify-send "VM" "Snapshot created" ;;
esac
"""

