# ── APPLICATIONS ──────────────────────────────────────────────────────────────

[[modules]]
description = "desktop app launcher (fzf)"
prefix = "app"
cmd = '''
selected="$(find /usr/share/applications "$HOME/.local/share/applications" \
  -name '*.desktop' 2>/dev/null \
  | xargs -I{} basename {} .desktop \
  | sort -u \
  | fzf \
    --no-info \
    --cycle \
    --gutter ' ' \
    --pointer '▌' \
    --color 'bg:#1F2937,bg+:#1F2937,fg:#F8F8F2,fg+:#F8F8F2,hl:#BD93F9,hl+:#FF79C6,pointer:#BD93F9' \
    --prompt '  ')"
[ -z "$selected" ] && exit 0
setsid -f gtk-launch "$selected" >/dev/null 2>&1
'''

[[modules]]
description = "open directory (yazi + fd)"
prefix = "yz"
cmd = """
d="$(fd --type d --hidden --exclude .git --exclude .cache . "$HOME" 2>/dev/null \
  | fzf \
    --cycle --gutter ' ' --pointer '▌' \
    --color 'bg:#1F2937,bg+:#1F2937,fg:#F8F8F2,hl:#BD93F9,pointer:#BD93F9' \
    --prompt '  Dir > ')"
if [ -n "$d" ]; then
    kitty -e yazi "$d" >/dev/null 2>&1 & disown
fi
exit 0
"""
unbind_proc = true

[[modules]]
description = "open file (fzf + fd)"
prefix = "fo"
cmd = """
f="$(fd --type f --hidden --exclude .git --exclude .cache . "$HOME" 2>/dev/null \
  | fzf \
    --cycle --gutter ' ' --pointer '▌' \
    --color 'bg:#1F2937,bg+:#1F2937,fg:#F8F8F2,hl:#BD93F9,pointer:#BD93F9' \
    --prompt '  File > ' \
    --preview 'bat --color=always --style=numbers {} 2>/dev/null || cat {}' \
    --preview-window=right:50%:wrap)"
if [ -n "$f" ]; then
    xdg-open "$f" >/dev/null 2>&1 & disown
fi
exit 0
"""
unbind_proc = true

[[modules]]
description = "kill process (fzf)"
prefix = "kill"
cmd = """
while true; do
  pid="$(ps -A -o pid,comm,pcpu,pmem --sort=-pcpu | awk 'NR==1; NR>1' \
    | fzf \
      --header-lines=1 \
      --cycle --gutter ' ' --pointer '▌' \
      --color 'bg:#1F2937,bg+:#1F2937,fg:#F8F8F2,hl:#FF5555,pointer:#FF5555' \
      --prompt '  Kill (ESC to exit) > ' \
    | awk '{print $1}')"
  
  if [ -z "$pid" ]; then
    break
  fi
  
  kill -9 "$pid" && notify-send "System" "Process $pid killed"
done
"""

[[modules]]
description = "uninstall arch packages (fzf)"
prefix = "rm"
cmd = """
setsid -f kitty --class pkg-manager --override window_padding_width=10 -e bash -c '
  echo "  📦 Выбери пакеты для удаления (TAB - выделить несколько):"
  echo " ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  pkgs="$(pacman -Qeq | fzf -m \
    --cycle --gutter " " --pointer "▌" \
    --color "bg:#1F2937,bg+:#1F2937,fg:#F8F8F2,hl:#FF5555,pointer:#FF5555" \
    --prompt "  Delete > " \
    --preview "pacman -Qi {}" \
    --preview-window=right:50%)"
  
  if [ -n "$pkgs" ]; then
    echo "Удаляем: $pkgs"
    sudo pacman -Rns $pkgs
  fi
  read -p "  Press Enter to exit..."
' >/dev/null 2>&1 &
"""
unbind_proc = true

