[[modules]]
description = "thermal paste check"
prefix = "temp"
cmd = """
kitty -e bash -c '
echo "  THERMAL PASTE ADVISOR — ThinkPad P50"
echo " ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
t1=$(cat /sys/class/hwmon/hwmon7/temp1_input 2>/dev/null || echo 0)
t2=$(cat /sys/class/hwmon/hwmon7/temp2_input 2>/dev/null || echo 0)
ec=$(cat /sys/class/hwmon/hwmon4/temp1_input 2>/dev/null || echo 0)
cpu=$((t1/1000)); pkg=$((t2/1000)); ec_c=$((ec/1000))
echo "  CPU Core:  ${cpu}°C"
echo "  Package:   ${pkg}°C"
echo "  EC sensor: ${ec_c}°C"
echo "  Delta:     $((pkg - ec_c))°C"
echo ""
score=0
[ $pkg -ge 90 ] && score=$((score+4))
[ $pkg -ge 80 ] && [ $pkg -lt 90 ] && score=$((score+3))
[ $pkg -ge 70 ] && [ $pkg -lt 80 ] && score=$((score+1))
[ $cpu -ge 85 ] && score=$((score+2))
[ $((pkg - ec_c)) -ge 25 ] && score=$((score+2))
[ $((pkg - ec_c)) -ge 15 ] && score=$((score+1))
echo "  Score: $score / 9"
echo ""
if [ $score -ge 7 ]; then
  echo "  ▓ ТОЧНО ДА — меняй прямо сейчас!"
elif [ $score -ge 5 ]; then
  echo "  ▒ ДА — замена нужна"
elif [ $score -ge 3 ]; then
  echo "  ░ ЖЕЛАТЕЛЬНО — скоро"
elif [ $score -ge 1 ]; then
  echo "  · СКОРО — следи за температурой"
else
  echo "  ✓ НЕТ — всё в порядке"
fi
echo ""
echo " ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
read -p "  Press Enter..."
' >/dev/null 2>&1 & disown
"""
unbind_proc = true

