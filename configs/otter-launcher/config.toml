# ── POMODORO / TOMATO TIMERS ──────────────────────────────────────────────────
# ── POMODORO / TOMATO TIMERS ──────────────────────────────────────────────────

[[modules]]
description = "Work: 2 hours (notifies at 1h and 2h)"
prefix = "t2"
cmd = """
bspc desktop -f '^7'
setsid -f kitty --start-as=fullscreen --class tomato-timer --override background=#1E1E2F --override foreground=#BD93F9 -e bash -c '
  (
    sleep 1h
    notify-send -u normal "⏳ Прогресс (Tomato)" "Прошел 1 час работы. Остался еще 1!"
    sleep 1h
    notify-send -u critical "🛑 Отличная работа!" "Прошло 2 часа. Закрывай таймер и запускай отдых (t30)!"
  ) &
  pid=$!
  termdown 2h --blink
  kill $pid 2>/dev/null
' >/dev/null 2>&1
"""
unbind_proc = true

