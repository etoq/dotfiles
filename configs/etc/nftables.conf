#!/usr/sbin/nft -f
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback
        iifname "lo" accept

        # Established/related
        ct state established,related accept

        # Invalid
        ct state invalid drop

        # ICMP
        ip protocol icmp icmp type echo-request limit rate 10/second accept
        ip6 nexthdr icmpv6 accept

        # libvirt bridge трафик
        iifname "virbr0" accept
        iifname "virbr1" accept

        log prefix "[nft-drop] " flags all drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # VM NAT forwarding (исправлено)
        iifname "virbr0" oifname "wlan0" accept
        iifname "wlan0" oifname "virbr0" ct state established,related accept

        # Изолированная сеть
        iifname "virbr1" drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {
    chain postrouting {
        type nat hook postrouting priority srcnat;
        oifname "wlan0" ip saddr 192.168.122.0/24 masquerade
    }
}
